<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Painel do Administrador</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin.css">

</head>

<body data-perfil="admin">

<div class="container">

    <!-- ========================= -->
    <!-- Header -->
    <!-- ========================= -->

    <header class="topo">

        <div>

            <h1>Painel do Administrador</h1>

            <p id="usuario-logado"></p>

        </div>

        <button id="logout" class="btn-sair">

            Sair

        </button>

    </header>

    <!-- ========================= -->
    <!-- Cadastro -->
    <!-- ========================= -->

    <section class="card">

        <h2>Cadastrar usuário</h2>

        <form id="formCadastro" class="grid-2">

            <input
                type="text"
                name="nome"
                placeholder="Nome"
                required>

            <input
                type="email"
                name="email"
                placeholder="E-mail"
                required>

            <input
                type="password"
                name="senha"
                placeholder="Senha"
                required>

            <select name="perfil">

                <option value="admin">Administrador</option>

                <option value="profissional">Profissional</option>

                <option value="aluno">Aluno</option>

            </select>

            <button
                class="btn-principal"
                type="submit">

                Cadastrar usuário

            </button>

        </form>

    </section>

    <!-- ========================= -->
    <!-- Gerenciamento -->
    <!-- ========================= -->

    <section class="card">

        <div class="titulo-tabela">

            <h2>Usuários cadastrados</h2>

            <div class="acoes-superiores">

                <input
                    id="pesquisa"
                    type="text"
                    placeholder="Pesquisar usuário...">

                <button
                    id="listarUsuarios"
                    class="btn-principal"
                    type="button">

                    Mostrar lista completa

                </button>

            </div>

        </div>

        <div class="tabela">

            <table>

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Nome</th>

                        <th>E-mail</th>

                        <th>Perfil</th>

                        <th>Status</th>

                        <th>Criado em</th>

                        <th>Ações</th>

                    </tr>

                </thead>

                <tbody id="corpoTabela">

                </tbody>

            </table>

        </div>

    </section>

    <!-- ========================= -->
    <!-- Editar -->
    <!-- ========================= -->

    <section
        class="card"
        id="cardEditar"
        style="display:none;">

        <h2>Editar usuário</h2>

        <form id="formEditar" class="grid-2">

            <input
                type="hidden"
                name="id">

            <input
                type="text"
                name="nome"
                placeholder="Nome">

            <input
                type="email"
                name="email"
                placeholder="E-mail">

            <input
                type="password"
                name="senha"
                placeholder="Nova senha (opcional)">

            <select name="perfil" required>

                <option value="admin">Administrador</option>

                <option value="profissional">Profissional</option>

                <option value="aluno">Aluno</option>

            </select>

            <select name="ativo">

                <option value="true">Ativo</option>

                <option value="false">Inativo</option>

            </select>

            <div class="botoes-edicao">

                <button
                    class="btn-principal"
                    type="submit">

                    Salvar alterações

                </button>

                <button
                    id="cancelarEdicao"
                    class="btn-secundario"
                    type="button">

                    Cancelar

                </button>

            </div>

        </form>

    </section>

    <!-- ========================= -->
    <!-- Mensagens -->
    <!-- ========================= -->

    <section class="card">

        <h2>Mensagens</h2>

        <div id="resultado" class="mensagem">

            Bem-vindo ao painel.

        </div>

    </section>

</div>

<script src="../js/auth.js"></script>
<script src="../js/homeadm.js"></script>

</body>

</html>
